    ErrorResponse:
      type: object
      required: [code, message, traceId]
      properties:
        code:
          type: string
          description: Código de error estandarizado
        message:
          type: string
          description: Mensaje legible para el desarrollador
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              rule:
                type: string
              message:
                type: string
          nullable: true
        traceId:
          type: string
          format: uuid

  responses:
    BadRequest:
      description: Payload malformado o tipos inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validationError:
              value:
                code: VALIDATION_ERROR
                message: "El campo 'wellName' excede el máximo de 100 caracteres."
                details:
                  - field: technicalDetails.wellName
                    rule: maxLength
                    message: "Máximo 100 caracteres."
                traceId: "00000000-0000-0000-0000-000000000099"

    Unauthorized:
      description: Token ausente, expirado o inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              value:
                code: UNAUTHORIZED
                message: "Token de autenticación ausente o inválido."
                traceId: "00000000-0000-0000-0000-000000000099"

    Forbidden:
      description: Rol sin permiso para la operación solicitada
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            forbidden:
              value:
                code: FORBIDDEN
                message: "No tiene permisos para realizar esta operación."
                traceId: "00000000-0000-0000-0000-000000000099"

    NotFound:
      description: Recurso no encontrado o fuera del alcance del tenant
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            notFound:
              value:
                code: NOT_FOUND
                message: "Registro no encontrado."
                traceId: "00000000-0000-0000-0000-000000000099"

    Conflict:
      description: Conflicto de estado, duplicado o concurrencia
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            stateConflict:
              value:
                code: INVALID_STATE_TRANSITION
                message: "El registro en estado SUBMITTED no permite esta operación."
                traceId: "00000000-0000-0000-0000-000000000099"

    UnprocessableEntity:
      description: Violación de regla de negocio
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            businessRule:
              value:
                code: BUSINESS_RULE_VIOLATION
                message: "Exclusión mutua: no puede tener Lahee y Clasificación Final simultáneamente."
                details:
                  - field: technicalDetails.laheeClassificationCode
                    rule: RN-07
                    message: "Solo una clasificación permitida."
                traceId: "00000000-0000-0000-0000-000000000099"

    TooManyRequests:
      description: Rate limit excedido
      headers:
        Retry-After:
          schema:
            type: integer
          description: Segundos hasta poder reintentar
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            internal:
              value:
                code: INTERNAL_ERROR
                message: "Error interno del servidor."
                traceId: "00000000-0000-0000-0000-000000000099"

