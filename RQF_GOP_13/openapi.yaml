  responses:
    BadRequest:
      description: Error de validación
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            code: VALIDATION_ERROR
            message: One or more validation errors occurred.
            details: [{ field: bswPercent, message: Value must be between 0 and 100 }]
            traceId: "00000000-0000-0000-0000-000000000999"
    Unauthorized:
      description: Token JWT ausente, inválido o expirado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            code: UNAUTHORIZED
            message: Authentication required.
            details: []
            traceId: "00000000-0000-0000-0000-000000000999"
    Forbidden:
      description: Sin permisos para este recurso/acción
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            code: FORBIDDEN
            message: You do not have permission to access this resource.
            details: []
            traceId: "00000000-0000-0000-0000-000000000999"
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            code: NOT_FOUND
            message: The requested resource was not found.
            details: []
            traceId: "00000000-0000-0000-0000-000000000999"
    InvalidState:
      description: Operación no permitida en el estado actual
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            code: INVALID_STATE
            message: This operation is not allowed in the current form state.
            details: []
            traceId: "00000000-0000-0000-0000-000000000999"
    UnprocessableEntity:
      description: Entidad no procesable por regla de negocio
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            code: CANNOT_DELETE_AVM_WELL
            message: Cannot delete a well preloaded from AVM.
            details: []
            traceId: "00000000-0000-0000-0000-000000000999"
    TooManyRequests:
      description: Rate limit excedido
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            code: RATE_LIMIT_EXCEEDED
            message: Too many requests. Please retry later.
            details: []
            traceId: "00000000-0000-0000-0000-000000000999"
